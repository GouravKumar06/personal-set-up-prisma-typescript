version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: postgresContainer
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: mydb
    ports:
      - "5432:5432"


  user_app:
    build:
      network: host
      context: ./
      dockerfile: Dockerfile
    environment:
      - DATABASE_URL=postgresql://postgres:admin123@postgres:5432/mydb
    ports:
      - '3000:3000'
    depends_on:
      - postgres
